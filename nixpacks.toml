[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.setuptools", "libGL", "libGLU", "glib"]

[phases.install]
cmds = [
  "python3.11 -m ensurepip --upgrade",
  "python3.11 -m pip install --upgrade pip",
  "python3.11 -m pip install -r requirements.txt"
]

[start]
cmd = "python3.11 -m gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120"
